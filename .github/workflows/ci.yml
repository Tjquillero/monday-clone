name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Jest
        run: npm test

  pgtap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: supabase/setup-cli@v1
        with:
          version: 2.107.0

      # supabase/.temp/project-ref ya está comiteado (proyecto enlazado),
      # así que --linked resuelve el proyecto sin `supabase link` explícito.
      - name: pgTAP (proyecto Supabase enlazado)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: node scripts/test-db-ci.mjs
